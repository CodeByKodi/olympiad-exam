# CI: Verify + Preview for feature branches and pull requests
# Runs tests, validation, build. Deploys preview to Surge.sh when SURGE_TOKEN is set.
# Production deployment is separate (deploy.yml, main only).

name: CI (Verify + Preview)

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: |
          echo "## Lint" >> $GITHUB_STEP_SUMMARY
          npm run lint && echo "✓ Lint passed" >> $GITHUB_STEP_SUMMARY

      - name: Unit tests
        run: |
          echo "## Unit tests" >> $GITHUB_STEP_SUMMARY
          npm run test:run && echo "✓ All tests passed" >> $GITHUB_STEP_SUMMARY

      - name: Data validation
        run: |
          echo "## Data validation" >> $GITHUB_STEP_SUMMARY
          npm run validate:data && echo "✓ Validation passed" >> $GITHUB_STEP_SUMMARY

      - name: Build for preview
        run: |
          npx vite build --base /
          echo "## Build" >> $GITHUB_STEP_SUMMARY
          echo "✓ Production build succeeded" >> $GITHUB_STEP_SUMMARY
        env:
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-build
          path: dist

      - name: Summary
        run: |
          echo "## Verify passed" >> $GITHUB_STEP_SUMMARY
          echo "✓ Lint, tests, validation, and build succeeded" >> $GITHUB_STEP_SUMMARY

  preview:
    name: Preview
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: preview-build

      - name: Deploy to Surge (preview)
        id: deploy
        run: |
          if [ -z "$SURGE_TOKEN" ]; then
            echo "## Preview skipped" >> $GITHUB_STEP_SUMMARY
            echo "Add **SURGE_TOKEN** repository secret to enable preview deployments." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            DOMAIN="olympiad-exam-pr-${{ github.event.pull_request.number }}"
          else
            BRANCH="${{ github.ref_name }}"
            SANITIZED=$(echo "$BRANCH" | sed 's/\//-/g' | sed 's/[^a-zA-Z0-9-]/-/g')
            DOMAIN="olympiad-exam-${SANITIZED}"
          fi
          npx surge dist "${DOMAIN}.surge.sh" --token "$SURGE_TOKEN"
          echo "url=https://${DOMAIN}.surge.sh" >> $GITHUB_OUTPUT
          echo "## Preview deployed" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://${DOMAIN}.surge.sh" >> $GITHUB_STEP_SUMMARY
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
