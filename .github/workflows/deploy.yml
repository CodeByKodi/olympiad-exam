# Production deployment to GitHub Pages
# Triggers: push to main only. Preview/CI is separate (ci.yml).
# Protected: only main branch deploys to production.

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: |
          echo "## Lint" >> $GITHUB_STEP_SUMMARY
          npm run lint && echo "✓ Lint passed" >> $GITHUB_STEP_SUMMARY

      - name: Unit tests
        run: |
          echo "## Unit tests" >> $GITHUB_STEP_SUMMARY
          npm run test:run && echo "✓ All tests passed" >> $GITHUB_STEP_SUMMARY

      - name: Data validation
        run: |
          echo "## Data validation" >> $GITHUB_STEP_SUMMARY
          npm run validate:data && echo "✓ Validation passed" >> $GITHUB_STEP_SUMMARY

      - name: Build for GitHub Pages
        run: |
          npx vite build --base /${{ github.event.repository.name }}/
          echo "## Build" >> $GITHUB_STEP_SUMMARY
          echo "✓ Production build succeeded" >> $GITHUB_STEP_SUMMARY
        env:
          NODE_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to Production
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          echo "## Production deployment" >> $GITHUB_STEP_SUMMARY
          echo "✓ Deployed to ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
